<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    >
    <title>blockbreak1</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding:
          max(4px, env(safe-area-inset-top))
          max(4px, env(safe-area-inset-right))
          max(4px, env(safe-area-inset-bottom))
          max(4px, env(safe-area-inset-left));
        overflow-x: hidden;
        overflow-y: auto;
        background:
          radial-gradient(circle at top, #1a3b63 0%, #0a1422 50%, #02060b 100%);
        color: #e4efff;
        font-family: "Trebuchet MS", "Hiragino Sans", sans-serif;
        touch-action: none;
      }

      main {
        display: grid;
        gap: 8px;
        width: 100%;
        min-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 16px);
        align-content: center;
        justify-items: center;
      }

      pyxel-run {
        display: block;
        width: 100%;
        line-height: 0;
        border: 2px solid rgba(228, 239, 255, 0.18);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        touch-action: none;
      }

      p {
        margin: 0;
        text-align: center;
        font-size: 12px;
        line-height: 1.5;
        color: rgba(228, 239, 255, 0.82);
      }

      .touch-controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        width: 100%;
      }

      .touch-button {
        appearance: none;
        border: 0;
        border-radius: 16px;
        padding: 12px 0;
        background: linear-gradient(180deg, #7cc7ff 0%, #3e88c7 100%);
        color: #04111d;
        font: 700 20px/1 "Trebuchet MS", "Hiragino Sans", sans-serif;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.35),
          0 10px 24px rgba(0, 0, 0, 0.28);
        touch-action: manipulation;
      }

      .touch-button:active,
      .touch-button.is-active {
        transform: translateY(1px);
        background: linear-gradient(180deg, #ffd36a 0%, #f4a317 100%);
      }

      @media (max-height: 760px) {
        body {
          padding:
            max(6px, env(safe-area-inset-top))
            max(6px, env(safe-area-inset-right))
            max(6px, env(safe-area-inset-bottom))
            max(6px, env(safe-area-inset-left));
        }

        main {
          gap: 6px;
        }

        .touch-controls {
          gap: 8px;
        }

        .touch-button {
          padding: 10px 0;
          font-size: 18px;
        }

        p {
          font-size: 11px;
          line-height: 1.35;
        }
      }

      @media (max-height: 680px) {
        p {
          display: none;
        }
      }

      @media (max-width: 640px) {
        body {
          padding:
            max(4px, env(safe-area-inset-top))
            max(4px, env(safe-area-inset-right))
            max(4px, env(safe-area-inset-bottom))
            max(4px, env(safe-area-inset-left));
        }

        main {
          gap: 4px;
          min-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 8px);
          padding-bottom: calc(env(safe-area-inset-bottom) + 64px);
        }

        pyxel-run {
          border-radius: 14px;
        }

        .touch-controls {
          display: none;
        }

        .touch-button {
          padding: 10px 0;
          font-size: 18px;
        }

        p {
          display: none;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>
  </head>
  <body>
    <main>
      <pyxel-run name="blockbreak1.py"></pyxel-run>
      <div class="touch-controls" aria-label="Touch controls">
        <button class="touch-button" data-key="ArrowLeft" type="button">LEFT</button>
        <button class="touch-button" data-key="ArrowRight" type="button">RIGHT</button>
      </div>
      <p>スマホは画面下の左右ボタンかドラッグで移動、タップで開始・リトライできます。</p>
    </main>
    <script>
      const GAME_WIDTH = 160;
      const GAME_HEIGHT = 220;

      const resizeGameLayout = () => {
        const screen = document.querySelector("#pyxel-screen");
        const canvas = document.querySelector("canvas");

        if (!screen || !canvas) {
          return false;
        }

        const bodyStyle = getComputedStyle(document.body);
        const viewportWidth = window.visualViewport?.width ?? window.innerWidth;
        const viewportHeight = window.visualViewport?.height ?? window.innerHeight;
        const horizontalPadding =
          parseFloat(bodyStyle.paddingLeft) + parseFloat(bodyStyle.paddingRight);
        const verticalPadding =
          parseFloat(bodyStyle.paddingTop) + parseFloat(bodyStyle.paddingBottom);
        const availableWidth = Math.max(180, viewportWidth - horizontalPadding);
        const availableHeight = Math.max(240, viewportHeight - verticalPadding);
        let targetWidth = Math.floor(availableWidth);
        let targetHeight = Math.floor((targetWidth * GAME_HEIGHT) / GAME_WIDTH);

        if (targetHeight > availableHeight) {
          targetHeight = Math.floor(availableHeight);
          targetWidth = Math.floor((targetHeight * GAME_WIDTH) / GAME_HEIGHT);
        }

        const offsetLeft = Math.max(0, Math.floor((viewportWidth - targetWidth) / 2));
        const offsetTop = Math.max(0, Math.floor((viewportHeight - targetHeight) / 2));

        screen.style.position = "fixed";
        screen.style.left = `${offsetLeft}px`;
        screen.style.top = `${offsetTop}px`;
        screen.style.width = `${targetWidth}px`;
        screen.style.height = `${targetHeight}px`;
        screen.style.backgroundColor = "transparent";
        screen.style.zIndex = "5";

        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.display = "block";
        canvas.style.imageRendering = "pixelated";
        canvas.style.touchAction = "none";

        return true;
      };

      const applyCanvasStyle = () => {
        const screen = document.querySelector("#pyxel-screen");
        const canvas = document.querySelector("canvas");
        if (!screen || !canvas) {
          return false;
        }

        resizeGameLayout();
        return true;
      };

      if (!applyCanvasStyle()) {
        const observer = new MutationObserver(() => {
          if (applyCanvasStyle()) {
            observer.disconnect();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });
      }

      window.addEventListener("resize", resizeGameLayout);
      window.addEventListener("orientationchange", resizeGameLayout);
      window.visualViewport?.addEventListener("resize", resizeGameLayout);
      resizeGameLayout();

      const pressedKeys = new Map();

      const emitKey = (type, key) => {
        const event = new KeyboardEvent(type, {
          key,
          code: key,
          bubbles: true,
          cancelable: true,
        });
        window.dispatchEvent(event);
        document.dispatchEvent(event);
      };

      const pressKey = (key, button) => {
        if (pressedKeys.has(key)) {
          return;
        }
        pressedKeys.set(key, button);
        button.classList.add("is-active");
        emitKey("keydown", key);
      };

      const releaseKey = (key) => {
        const button = pressedKeys.get(key);
        if (!button) {
          return;
        }
        pressedKeys.delete(key);
        button.classList.remove("is-active");
        emitKey("keyup", key);
      };

      document.querySelectorAll(".touch-button").forEach((button) => {
        const key = button.dataset.key;

        const start = (event) => {
          event.preventDefault();
          pressKey(key, button);
        };

        const end = (event) => {
          event.preventDefault();
          releaseKey(key);
        };

        button.addEventListener("pointerdown", start);
        button.addEventListener("pointerup", end);
        button.addEventListener("pointercancel", end);
        button.addEventListener("pointerleave", () => releaseKey(key));
      });
    </script>
  </body>
</html>
